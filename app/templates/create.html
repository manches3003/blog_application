{% extends "base.html" %}
{% block title %}Create Post - Flask Blog{% endblock %}
{% block content %}
    <h1>✨ Create New Post</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">📌 Title</label>
            <input type="text" id="title" name="title" required placeholder="Enter post title">
        </div>
        <div class="form-group">
            <label for="author">✍️ Author</label>
            <input type="text" id="author" name="author" placeholder="Anonymous">
        </div>
        <div class="form-group">
            <label for="content">📝 Content</label>
            <textarea id="content" name="content" rows="10" required placeholder="Write your post content here..."></textarea>
        </div>
        <button type="submit" class="btn btn-success">🚀 Create Post</button>
        <a href="{{ url_for('web.index') }}" class="btn" style="background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);">Cancel</a>
    </form>
{% endblock %}
