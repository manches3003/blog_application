{% extends "base.html" %}
{% block title %}Edit Post - Flask Blog{% endblock %}
{% block content %}
    <h1>✏️ Edit Post</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">📌 Title</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>
        <div class="form-group">
            <label for="author">✍️ Author</label>
            <input type="text" id="author" name="author" value="{{ post.author }}">
        </div>
        <div class="form-group">
            <label for="content">📝 Content</label>
            <textarea id="content" name="content" rows="10" required>{{ post.content }}</textarea>
        </div>
        <button type="submit" class="btn btn-success">💾 Update Post</button>
        <a href="{{ url_for('web.view_post', post_id=post.id) }}" class="btn" style="background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);">Cancel</a>
    </form>
{% endblock %}
