name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          FLASK_ENV: testing
        run: pytest tests/ -v

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-blog:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Clean any leftover git state
        run: |
          # Remove any .gitmodules references
          rm -f .gitmodules
          rm -rf .git/modules
          rm -rf actions-runner
          # Clean git config
          git config --global --remove-section submodule 2>/dev/null || true
          git config --global --remove-section http 2>/dev/null || true
        continue-on-error: true
        shell: bash

      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Deploy to minikube
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/flask-blog-deployment.yaml
          kubectl apply -f k8s/flask-blog-service.yaml
          kubectl rollout restart deployment flask-blog
          kubectl get pods -l app=flask-blog
