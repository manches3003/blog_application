name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
            python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
            FLASK_ENV: testing
        run: pytest tests/ -v

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-blog:latest

      - name: Deploy to minikube
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/flask-blog-deployment.yaml
          kubectl apply -f k8s/flask-blog-service.yaml
          kubectl rollout restart deployment flask-blog
          kubectl get pods -l app=flask-blog